name: GUI CI

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:

permissions:
  contents: write
  id-token: write

env:
  DIRCTL_VERSION: 1.2.0

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      MEASUREMENT_ID: ${{ vars.MEASUREMENT_ID }}
      API_SECRET: ${{ secrets.API_SECRET }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: "stable"

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.2"

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 #v2.0.0

      - name: Create .env file
        run: |
          echo "MEASUREMENT_ID=$MEASUREMENT_ID" > .env
          echo "API_SECRET=$API_SECRET" >> .env

      - name: Install dirctl
        run: |
          task deps:dirctl

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          use_oidc: true
          files: ./coverage/lcov.info

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    env:
      MEASUREMENT_ID: ${{ vars.MEASUREMENT_ID }}
      API_SECRET: ${{ secrets.API_SECRET }}
    needs:
      - test
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: "stable"

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.2"

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 #v2.0.0

      - name: Create .env file
        run: |
          echo "MEASUREMENT_ID=$MEASUREMENT_ID" > .env
          echo "API_SECRET=$API_SECRET" >> .env

      - name: Install dirctl
        run: |
          task deps:dirctl

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Create macOS runner
        run: flutter create --platforms=macos .

      - name: Configure macOS app
        run: |
          sed -i '' 's/PRODUCT_NAME = gui/PRODUCT_NAME = AGNTCY Directory/' macos/Runner/Configs/AppInfo.xcconfig
          sed -i '' 's/<\/dict>/	<key>com.apple.security.network.client<\/key>\n	<true\/>\n	<key>com.apple.security.cs.disable-library-validation<\/key>\n	<true\/>\n<\/dict>/' macos/Runner/Release.entitlements

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Build macOS app
        run: flutter build macos --release

      - name: Bundle dirctl
        run: |
          cp ".bin/dirctl" "build/macos/Build/Products/Release/AGNTCY Directory.app/Contents/Resources/dirctl"
          chmod +x "build/macos/Build/Products/Release/AGNTCY Directory.app/Contents/Resources/dirctl"

      - name: Re-sign macOS app
        run: |
          xattr -cr "build/macos/Build/Products/Release/AGNTCY Directory.app"
          codesign --force --sign - --options runtime "build/macos/Build/Products/Release/AGNTCY Directory.app/Contents/Resources/dirctl"
          codesign --force --deep --sign - --entitlements macos/Runner/Release.entitlements --options runtime "build/macos/Build/Products/Release/AGNTCY Directory.app"

      - name: Verify macOS app signature
        run: |
          codesign --verify --deep --strict --verbose=2 "build/macos/Build/Products/Release/AGNTCY Directory.app"
          spctl --assess --verbose --type execute "build/macos/Build/Products/Release/AGNTCY Directory.app" || true

      - name: Create DMG
        run: |
          mkdir -p "build/macos/Build/Products/Release/dmg_staging"
          cp -R "build/macos/Build/Products/Release/AGNTCY Directory.app" "build/macos/Build/Products/Release/dmg_staging/"
          ln -s /Applications "build/macos/Build/Products/Release/dmg_staging/Applications"
          hdiutil create -volname "AGNTCY Directory" \
            -srcfolder "build/macos/Build/Products/Release/dmg_staging" \
            -ov -format UDZO \
            "dir-gui-darwin-universal.dmg"

      - name: Upload DMG
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dir-gui-darwin-universal
          path: dir-gui-darwin-universal.dmg

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${{ github.ref_name }}" dir-gui-darwin-universal.dmg --generate-notes || \
          gh release upload "${{ github.ref_name }}" dir-gui-darwin-universal.dmg --clobber

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    env:
      MEASUREMENT_ID: ${{ vars.MEASUREMENT_ID }}
      API_SECRET: ${{ secrets.API_SECRET }}
    needs:
      - test
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: "stable"

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.2"

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 #v2.0.0

      - name: Create .env file
        shell: bash
        run: |
          echo "MEASUREMENT_ID=$MEASUREMENT_ID" > .env
          echo "API_SECRET=$API_SECRET" >> .env

      - name: Install dirctl
        run: |
          task deps:dirctl

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Create Windows runner
        run: flutter create --platforms=windows .

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows app
        run: flutter build windows --release

      - name: Bundle dirctl
        run: Copy-Item -Path .bin\dirctl -Destination build\windows\x64\runner\Release\dirctl.exe

      - name: Archive Windows build
        run: |
          if (Test-Path "build\windows\x64\runner\Release") {
            Get-ChildItem "build\windows\x64\runner\Release"
            Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath dir-gui-windows-amd64.zip
          } else {
            Write-Error "Build directory build\windows\x64\runner\Release does not exist. Build likely failed."
            exit 1
          }

      - name: Upload Windows Build
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dir-gui-windows-amd64
          path: dir-gui-windows-amd64.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${{ github.ref_name }}" dir-gui-windows-amd64.zip --generate-notes || \
          gh release upload "${{ github.ref_name }}" dir-gui-windows-amd64.zip --clobber

  success:
    name: Success
    if: ${{ !cancelled() && !contains(needs.*.result, 'cancelled') && !contains(needs.*.result, 'failure') }}
    needs:
      - test
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Echo Success
        run: |
          if [[ "${{ needs.changes.outputs.code }}" == "true" ]]; then
            echo "::notice Success! All code checks passed."
          else
            echo "::notice Success! No code changes detected, skipped builds and tests."
          fi
